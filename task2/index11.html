<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic 12 - Four Types of Functions</title>
</head>
<body>
    

    <script>
        // Task 46
        function myName() {
            console.log("Nitesh");
        }
        myName();

        // Task 47
        function welcome() {
            console.log("Welcome to JavaScript");
        }
        welcome();

        // Task 48
        function printNumbers() {
            for (let i = 1; i <= 5; i++) {
                console.log(i);
            }
        }
        printNumbers();

        // Task 49
        function greet(name) {
            console.log("Hello, " + name);
        }
        greet("Rahul");

        // Task 50
        function add(num1, num2) {
            console.log(num1 + num2);
        }
        add(10, 15);

        // Task 51
        function larger(num1, num2) {
            console.log(num1 > num2 ? num1 : num2);
        }
        larger(8, 20);

        // Task 52
        function one() {
            return 1;
        }
        console.log(one());

        // Task 53
        function randomNumber() {
            return Math.random();
        }
        console.log(randomNumber());

        // Task 54
        function sum(num1, num2) {
            return num1 + num2;
        }
        console.log(sum(25, 10));

        // Task 55
        function difference(num1, num2) {
            return num1 - num2;
        }
        console.log(difference(25, 10));
    </script>
</body>
</html>
