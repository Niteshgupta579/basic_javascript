<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let name="Rohan"
        let age =20
        console.log("Original Name:", name);
        console.log("Age:", age);
console.log("Length:", name.length)
console.log("Uppercase:", name.toUpperCase())
console.log("Lowercase:", name.toLowerCase())
console.log("Match 'ha':", name.match("ha"))
console.log("Slice (0,3):", name.slice(0, 3))
console.log("Replace 'Rohan' with 'Rahul':", name.replace("Rohan", "Rahul"))
console.log("Split into characters:", name.split(""));
console.log("Includes 'han':", name.includes("han"))
console.log("Includes 'xyz':", name.includes("xyz"))
console.log(`Hello, ${name}! You are ${age} years old.`)

    </script>
</body>
</html>
