<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forEach() Tasks</title>
</head>
<body>

   

    <script>
        // ============================================
        // Task 29
        // Print every element
        // ============================================

        console.log("Task 29");

        let nums1 = [1, 2, 3, 4, 5];

        nums1.forEach((item) => {
            console.log(item);
        });

        // ============================================
        // Task 30
        // Print name with index
        // ============================================

        console.log("\nTask 30");

        let names = ["Rohan", "Rahul", "Sneha"];

        names.forEach((item, index) => {
            console.log(index + ": " + item);
        });

        // ============================================
        // Task 31
        // Calculate sum
        // ============================================

        console.log("\nTask 31");

        let nums2 = [10, 20, 30];

        let sum = 0;

        nums2.forEach((item) => {
            sum += item;
        });

        console.log("Total =", sum);

        // ============================================
        // Task 32
        // Print even numbers
        // ============================================

        console.log("\nTask 32");

        let nums3 = [1, 2, 3, 4, 5, 6];

        nums3.forEach((item) => {
            if (item % 2 === 0) {
                console.log(item);
            }
        });

    </script>

</body>
</html>
