<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>

  
    <script>

        // ============================================
        // Task 37
        // Copy the first three elements
        // ============================================

        console.log("========== Task 37 ==========");

        let nums1 = [10, 20, 30, 40, 50];

        let firstThree = nums1.slice(0, 3);

        console.log("Original Array:", nums1);
        console.log("First Three Elements:", firstThree);


        // ============================================
        // Task 38
        // Copy the last two elements
        // ============================================

        console.log("\n========== Task 38 ==========");

        let nums2 = [10, 20, 30, 40, 50];

        let lastTwo = nums2.slice(-2);

        console.log("Original Array:", nums2);
        console.log("Last Two Elements:", lastTwo);


        // ============================================
        // Task 39
        // Extract elements from index 2 to 5
        // slice(start, end)
        // End index is NOT included
        // ============================================

        console.log("\n========== Task 39 ==========");

        let nums3 = [10, 20, 30, 40, 50, 60];

        let result = nums3.slice(2, 5);

        console.log("Original Array:", nums3);
        console.log("Elements from index 2 to 5:", result);


        // ============================================
        // Task 40
        // Copy the entire array
        // ============================================

        console.log("\n========== Task 40 ==========");

        let nums4 = [1, 2, 3, 4, 5];

        let copiedArray = nums4.slice();

        console.log("Original Array:", nums4);
        console.log("Copied Array:", copiedArray);

    </script>

</body>
</html>
