<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>let num1 = 50;
let num2 = 10;
let operator = "-";

switch (operator) {
    case "+":
        console.log("Result:", num1 + num2);
        break;
    case "-":
        console.log("Result:", num1 - num2);
        break;
    case "*":
        console.log("Result:", num1 * num2);
        break;
    case "/":
        console.log("Result:", num1 / num2);
        break;
    default:
        console.log("Invalid operator");
}</script>
</body>
</html>
